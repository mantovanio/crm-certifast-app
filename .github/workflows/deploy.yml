name: Deploy Certifast

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.79.111.76
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/certifast-crm
            git fetch origin main
            git checkout main
            git pull origin main
            bash ./deploy.sh
