name: Deploy Certifast

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-vps:
    runs-on: self-hosted
    steps:
      - name: Atualizar repositório na VPS
        run: |
          set -e
          cd /opt/certifast-crm
          git fetch origin main
          git checkout main
          git pull origin main

      - name: Executar deploy local
        run: |
          set -e
          cd /opt/certifast-crm
          bash ./deploy.sh
