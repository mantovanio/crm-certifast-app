services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_certifast_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: crm_certifast_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./api
    container_name: crm_certifast_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3307
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
      - minio
    ports:
      - "${API_PORT}:3307"

  web:
    build:
      context: ./web
    container_name: crm_certifast_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:80"

volumes:
  postgres_data:
  minio_data:
